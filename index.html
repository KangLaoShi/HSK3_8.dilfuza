          { q: "上个星期我买了一条裤子，昨天______买了一条。", options: ["又", "再", "就"], ans: "又" },
          { q: "你只吃了一点儿饭，______吃一点儿吧。", options: ["又", "再", "就"], ans: "再" },
          { q: "那个饭馆我昨天去了一次，明天还想______去一次。", options: ["又", "再", "就"], ans: "再" },
          { q: "小刚，你怎么______迟到了？昨天不是也迟到了吗？", options: ["又", "再", "就"], ans: "又" },
          { q: "什么东西便宜我______买什么。", options: ["又", "再", "就"], ans: "就" },
          { q: "你想喝点儿什么？ —— 你喝什么我______喝什么。", options: ["又", "再", "就"], ans: "就" },
          { q: "你哪天有时间______哪天来我家吧。", options: ["又", "再", "就"], ans: "就" },
          { q: "想吃什么______吃什么，胖瘦没关系。", options: ["又", "再", "就"], ans: "就" }
        ];

        const FILL_BLANKS_DATA = [
          {
            words: ["层", "几乎", "洗手间", "电梯", "害怕"],
            sentences: [
              { parts: ["你家住几", "？"], ans: "层" },
              { parts: ["", "里人太多了，我们走上去吧。"], ans: "电梯" },
              { parts: ["没事儿，我一点儿也不", "。"], ans: "害怕" },
              { parts: ["我去一下", "，马上回来。"], ans: "洗手间" },
              { parts: ["我现在", "每天都要用电脑。"], ans: "几乎" }
            ]
          },
          {
            words: ["见面", "变化", "重要", "熊猫", "满意"],
            sentences: [
              { parts: ["A: 您对我们的服务", "吗？\nB: 不错，我玩儿得很高兴。"], ans: "满意" },
              { parts: ["A: 周末你做什么了？\nB: 我去看", "了。"], ans: "熊猫" },
              { parts: ["A: 我们几点", "？\nB: 三点半吧。"], ans: "见面" },
              { parts: ["A: 你看你，这几年一点儿", "都没有。\nB: 是啊，我每天都运动。"], ans: "变化" },
              { parts: ["A: 这件衣服太贵了，别买了。\nB: 贵不贵不", "，你喜欢就行。"], ans: "重要" }
            ]
          }
        ];

        // --- Components ---

        const PandaSVG = () => (
          <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#E2E8F0" />
            <circle cx="30" cy="35" r="12" fill="#1A202C" />
            <circle cx="70" cy="35" r="12" fill="#1A202C" />
            <circle cx="50" cy="60" r="30" fill="#FFFFFF" />
            <circle cx="40" cy="55" r="6" fill="#1A202C" />
            <circle cx="60" cy="55" r="6" fill="#1A202C" />
            <ellipse cx="50" cy="65" rx="5" ry="3" fill="#1A202C" />
            <path d="M45 70 Q50 75 55 70" stroke="#1A202C" strokeWidth="2" strokeLinecap="round" />
          </svg>
        );

        const Flashcards = () => {
          const [currentIndex, setCurrentIndex] = useState(0);
          const [isFlipped, setIsFlipped] = useState(false);

          const nextCard = () => {
            setIsFlipped(false);
            setTimeout(() => setCurrentIndex((prev) => (prev + 1) % VOCABULARY.length), 150);
          };
          const prevCard = () => {
            setIsFlipped(false);
            setTimeout(() => setCurrentIndex((prev) => (prev - 1 + VOCABULARY.length) % VOCABULARY.length), 150);
          };

          const card = VOCABULARY[currentIndex];

          return (
            <div className="flex flex-col items-center p-6 bg-white rounded-2xl shadow-lg border border-gray-100 min-h-[400px]">
              <div className="mb-4 text-sm font-semibold text-gray-500 bg-gray-100 px-4 py-1 rounded-full">
                {currentIndex + 1} / {VOCABULARY.length}
              </div>
              
              <div 
                className="relative w-full max-w-sm h-72 cursor-pointer perspective-1000"
                onClick={() => setIsFlipped(!isFlipped)}
              >
                <div className={`w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                  {/* Front */}
                  <div className="absolute inset-0 backface-hidden bg-gradient-to-br from-red-50 to-orange-50 rounded-2xl shadow-md border-2 border-red-100 flex flex-col items-center justify-center p-6">
                    <h2 className="text-6xl font-bold text-red-600 mb-4">{card.cn}</h2>
                    <p className="text-2xl text-gray-700">{card.py}</p>
                    <p className="text-sm text-gray-400 mt-4 flex items-center"><RefreshCw size={14} className="mr-1"/> 点击翻转 (Click to flip)</p>
                  </div>
                  
                  {/* Back */}
                  <div className="absolute inset-0 backface-hidden rotate-y-180 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-2xl shadow-md border-2 border-blue-100 flex flex-col items-center justify-center p-6 text-center">
                    <div className="space-y-4 w-full">
                      <div className="bg-white p-3 rounded-lg shadow-sm border border-blue-50">
                        <p className="text-xs text-blue-400 font-semibold mb-1 uppercase tracking-wider">Uzbek</p>
                        <p className="text-lg font-medium text-gray-800">{card.uz}</p>
                      </div>
                      <div className="bg-white p-3 rounded-lg shadow-sm border border-blue-50">
                        <p className="text-xs text-blue-400 font-semibold mb-1 uppercase tracking-wider">Русский</p>
                        <p className="text-lg font-medium text-gray-800">{card.ru}</p>
                      </div>
                      <div className="bg-white p-3 rounded-lg shadow-sm border border-blue-50">
                        <p className="text-xs text-blue-400 font-semibold mb-1 uppercase tracking-wider">English</p>
                        <p className="text-lg font-medium text-gray-800">{card.en}</p>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div className="flex gap-6 mt-8">
                <button onClick={prevCard} className="p-3 rounded-full bg-gray-100 hover:bg-red-100 hover:text-red-600 transition-colors">
                  <ChevronLeft size={28} />
                </button>
                <button onClick={nextCard} className="p-3 rounded-full bg-gray-100 hover:bg-red-100 hover:text-red-600 transition-colors">
                  <ChevronRight size={28} />
                </button>
              </div>
            </div>
          );
        };

        const Quiz = ({ questions, title }) => {
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);
          const [score, setScore] = useState(0);

          const handleSelect = (qIndex, option) => {
            if (submitted) return;
            setAnswers({ ...answers, [qIndex]: option });
          };

          const handleSubmit = () => {
            let newScore = 0;
            questions.forEach((q, i) => {
              if (answers[i] === q.ans) newScore += 1;
            });
            setScore(newScore);
            setSubmitted(true);
          };

          const reset = () => {
            setAnswers({});
            setSubmitted(false);
            setScore(0);
          };

          return (
            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
              <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <CheckCircle className="mr-3 text-green-500" /> {title} ({questions.length} 题)
              </h2>
              
              {submitted && (
                <div className="mb-6 p-4 bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 rounded-xl flex items-center justify-between">
                  <div>
                    <h3 className="text-xl font-bold text-green-800 flex items-center">
                      <Award className="mr-2" /> 你的分数 (Score): {score} / {questions.length}
                    </h3>
                    <p className="text-green-600 mt-1">
                      {score === questions.length ? "太棒了！ Perfect!" : "继续努力！ Keep practicing!"}
                    </p>
                  </div>
                  <button onClick={reset} className="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 shadow-sm transition-all">
                    再做一次 (Retry)
                  </button>
                </div>
              )}

              <div className="space-y-6">
                {questions.map((q, idx) => {
                  const isCorrect = answers[idx] === q.ans;
                  const isAnswered = answers[idx] !== undefined;
                  
                  return (
                    <div key={idx} className={`p-5 rounded-xl border ${submitted ? (isCorrect ? 'border-green-200 bg-green-50' : 'border-red-200 bg-red-50') : 'border-gray-200 bg-gray-50'}`}>
                      <p className="font-medium text-lg text-gray-800 mb-4">{idx + 1}. {q.q}</p>
                      <div className="flex flex-wrap gap-3">
                        {q.options.map((opt) => {
                          const isSelected = answers[idx] === opt;
                          let btnClass = "px-4 py-2 rounded-lg border font-medium transition-all ";
                          
                          if (!submitted) {
                            btnClass += isSelected ? "bg-red-500 text-white border-red-600 shadow-md" : "bg-white text-gray-700 border-gray-300 hover:border-red-400 hover:text-red-600 cursor-pointer";
                          } else {
                            if (opt === q.ans) {
                              btnClass += "bg-green-500 text-white border-green-600";
                            } else if (isSelected && !isCorrect) {
                              btnClass += "bg-red-500 text-white border-red-600";
                            } else {
                              btnClass += "bg-white text-gray-400 border-gray-200 opacity-60";
                            }
                          }

                          return (
                            <button
                              key={opt}
                              onClick={() => handleSelect(idx, opt)}
                              disabled={submitted}
                              className={btnClass}
                            >
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                      {submitted && !isCorrect && (
                        <p className="text-sm mt-3 text-red-600 font-medium">✅ 正确答案 (Correct): {q.ans}</p>
                      )}
                    </div>
                  );
                })}
              </div>

              {!submitted && (
                <button 
                  onClick={handleSubmit} 
                  disabled={Object.keys(answers).length !== questions.length}
                  className="mt-8 w-full py-3 bg-red-600 disabled:bg-gray-300 text-white font-bold rounded-xl shadow-md hover:bg-red-700 transition-colors"
                >
                  提交答案 (Submit Answers)
                </button>
              )}
            </div>
          );
        };

        const Dialogues = () => {
          return (
            <div className="space-y-6">
              {DIALOGUES.map((dialogue, idx) => (
                <div key={idx} className="bg-white rounded-2xl shadow-md border border-gray-100 overflow-hidden">
                  <div className="bg-gradient-to-r from-red-50 to-orange-50 px-6 py-4 border-b border-red-100">
                    <h3 className="text-xl font-bold text-gray-800 flex items-center">
                      <MessageCircle className="mr-2 text-red-500" /> {dialogue.title}
                    </h3>
                  </div>
                  <div className="p-6 space-y-5">
                    {dialogue.lines.map((line, i) => (
                      <div key={i} className="flex gap-4 p-4 rounded-xl bg-gray-50 hover:bg-gray-100 transition-colors">
                        <div className="flex-shrink-0">
                          <span className="inline-block bg-red-100 text-red-700 font-bold px-3 py-1 rounded-lg text-sm">
                            {line.speaker}
                          </span>
                        </div>
                        <div className="space-y-1 w-full">
                          <p className="text-xl font-medium text-gray-900">{line.cn}</p>
                          <p className="text-sm text-gray-500 font-mono tracking-wide">{line.py}</p>
                          <div className="mt-3 pt-3 border-t border-gray-200 grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
                            <p><span className="font-semibold text-blue-600">UZ:</span> {line.uz}</p>
                            <p><span className="font-semibold text-green-600">RU:</span> {line.ru}</p>
                            <p><span className="font-semibold text-purple-600">EN:</span> {line.en}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        };

        const Grammar = () => {
          return (
            <div className="space-y-8">
              {GRAMMAR.map((gram, idx) => (
                <div key={idx} className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
                  <div className="bg-blue-50 px-6 py-4 border-b border-blue-100">
                    <h3 className="text-xl font-bold text-blue-900 flex items-center">
                      <HelpCircle className="mr-2 text-blue-500" /> {gram.title}
                    </h3>
                  </div>
                  <div className="p-6">
                    <div className="bg-white p-5 rounded-xl border-l-4 border-blue-400 shadow-sm mb-6 space-y-3">
                      <p className="text-gray-800 font-medium">{gram.desc.cn}</p>
                      <p className="text-gray-600 text-sm"><span className="font-bold">UZ:</span> {gram.desc.uz}</p>
                      <p className="text-gray-600 text-sm"><span className="font-bold">RU:</span> {gram.desc.ru}</p>
                      <p className="text-gray-600 text-sm"><span className="font-bold">EN:</span> {gram.desc.en}</p>
                    </div>
                    
                    <h4 className="font-bold text-gray-700 mb-4 px-2">例子 (Examples):</h4>
                    <div className="space-y-3">
                      {gram.examples.map((ex, i) => (
                        <div key={i} className="p-4 bg-gray-50 rounded-lg border border-gray-100 hover:border-blue-200 transition-colors">
                          <p className="text-lg font-bold text-gray-800 mb-2">{ex.cn}</p>
                          <div className="text-sm text-gray-600 space-y-1">
                            <p><span className="text-blue-500 font-semibold text-xs uppercase">UZ:</span> {ex.uz}</p>
                            <p><span className="text-green-500 font-semibold text-xs uppercase">RU:</span> {ex.ru}</p>
                            <p><span className="text-purple-500 font-semibold text-xs uppercase">EN:</span> {ex.en}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        };

        const FillInBlanks = () => {
          const [answers, setAnswers] = useState({});
          const [submitted, setSubmitted] = useState(false);

          const handleSelect = (partIdx, qIdx, value) => {
            if (submitted) return;
            setAnswers({ ...answers, [`${partIdx}_${qIdx}`]: value });
          };

          const handleSubmit = () => setSubmitted(true);
          const reset = () => { setAnswers({}); setSubmitted(false); };

          let score = 0;
          let total = 0;
          FILL_BLANKS_DATA.forEach((part, pIdx) => {
            part.sentences.forEach((q, qIdx) => {
              total++;
              if (answers[`${pIdx}_${qIdx}`] === q.ans) score++;
            });
          });

          return (
            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
              <div className="mb-6 space-y-2">
                <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                  <Edit className="mr-3 text-orange-500" /> 选择恰当的词语填空 
                </h2>
                <p className="text-gray-500 text-sm flex gap-4">
                  <span>UZ: Bo'sh joylarga mos so'zlarni qoʻying.</span>
                  <span>RU: Заполните пропуски подходящими словами.</span>
                </p>
              </div>

              {submitted && (
                <div className="mb-8 p-4 bg-gradient-to-r from-orange-50 to-amber-50 border border-orange-200 rounded-xl flex items-center justify-between">
                  <div>
                    <h3 className="text-xl font-bold text-orange-800 flex items-center">
                      <Award className="mr-2" /> 你的分数 (Score): {score} / {total}
                    </h3>
                  </div>
                  <button onClick={reset} className="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 shadow-sm transition-all">
                    再做一次 (Retry)
                  </button>
                </div>
              )}

              <div className="space-y-10">
                {FILL_BLANKS_DATA.map((part, pIdx) => (
                  <div key={pIdx} className="bg-gray-50 p-6 rounded-xl border border-gray-200">
                    <div className="flex flex-wrap gap-3 mb-6 p-4 bg-white rounded-lg border border-orange-100 shadow-sm justify-center">
                      {part.words.map((w, i) => (
                        <span key={i} className="px-4 py-2 bg-orange-100 text-orange-800 font-bold rounded-lg tracking-widest">{w}</span>
                      ))}
                    </div>

                    <div className="space-y-6">
                      {part.sentences.map((sentence, qIdx) => {
                        const ansKey = `${pIdx}_${qIdx}`;
                        const isCorrect = answers[ansKey] === sentence.ans;
                        const isAnswered = answers[ansKey] !== undefined;

                        let selectClass = "mx-2 px-3 py-1 font-bold rounded-lg border-b-2 outline-none transition-colors appearance-none text-center min-w-[100px] cursor-pointer ";
                        if (!submitted) {
                          selectClass += answers[ansKey] ? "border-orange-500 text-orange-700 bg-orange-50" : "border-gray-400 bg-white text-gray-700";
                        } else {
                          selectClass += isCorrect ? "border-green-500 text-green-700 bg-green-50" : "border-red-500 text-red-700 bg-red-50";
                        }

                        return (
                          <div key={qIdx} className="text-lg text-gray-800 leading-relaxed whitespace-pre-wrap">
                            {sentence.parts[0]}
                            <select
                              value={answers[ansKey] || ''}
                              onChange={(e) => handleSelect(pIdx, qIdx, e.target.value)}
                              disabled={submitted}
                              className={selectClass}
                            >
                              <option value="" disabled>___</option>
                              {part.words.map(w => <option key={w} value={w}>{w}</option>)}
                            </select>
                            {sentence.parts[1]}
                            {submitted && !isCorrect && (
                              <span className="ml-3 text-sm text-green-600 font-bold">({sentence.ans})</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              {!submitted && (
                <button 
                  onClick={handleSubmit} 
                  disabled={Object.keys(answers).length < total}
                  className="mt-8 w-full py-3 bg-orange-600 disabled:bg-gray-300 text-white font-bold rounded-xl shadow-md hover:bg-orange-700 transition-colors"
                >
                  提交答案 (Submit Answers)
                </button>
              )}
            </div>
          );
        };


        // --- Main App Component ---
        function App() {
          const [activeTab, setActiveTab] = useState('flashcards');

          const navItems = [
            { id: 'flashcards', label: '生词闪卡', icon: <Layers size={18} /> },
            { id: 'vocabTest', label: '生词测试', icon: <CheckCircle size={18} /> },
            { id: 'fillBlanks', label: '词语填空', icon: <Edit size={18} /> },
            { id: 'dialogues', label: '对话内容', icon: <MessageCircle size={18} /> },
            { id: 'grammar', label: '语法解释', icon: <BookOpen size={18} /> },
            { id: 'grammarTest', label: '语法测试', icon: <PlayCircle size={18} /> }
          ];

          return (
            <div>
              {/* Header */}
              <header className="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
                <div className="max-w-5xl mx-auto px-4 py-6 flex flex-col md:flex-row items-center justify-between">
                  <div className="flex items-center gap-4">
                    <div className="hidden md:block drop-shadow-sm">
                       <PandaSVG />
                    </div>
                    <div>
                      <h1 className="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">
                        你去哪儿我就去哪儿
                      </h1>
                      <p className="text-sm md:text-base text-red-600 font-semibold mt-1">
                        Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                      </p>
                    </div>
                  </div>
                  
                  <div className="mt-4 md:mt-0 bg-red-50 text-red-700 px-4 py-2 rounded-full font-bold text-sm shadow-inner border border-red-100 flex items-center">
                    HSK 3 - 第8课 (Lesson 8)
                  </div>
                </div>

                {/* Navigation */}
                <div className="max-w-5xl mx-auto px-4 mt-2 overflow-x-auto">
                  <nav className="flex space-x-2 pb-2">
                    {navItems.map((item) => (
                      <button
                        key={item.id}
                        onClick={() => setActiveTab(item.id)}
                        className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-all whitespace-nowrap ${
                          activeTab === item.id 
                          ? 'bg-red-600 text-white shadow-md' 
                          : 'bg-white text-gray-600 hover:bg-red-50 hover:text-red-600'
                        }`}
                      >
                        {item.icon}
                        {item.label}
                      </button>
                    ))}
                  </nav>
                </div>
              </header>

              {/* Main Content Area */}
              <main className="max-w-5xl mx-auto px-4 py-8 min-h-[60vh]">
                {activeTab === 'flashcards' && (
                  <div className="animate-in duration-500">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                      <Layers className="mr-3 text-red-500"/> 生词闪卡 (Flashcards)
                    </h2>
                    <Flashcards />
                  </div>
                )}

                {activeTab === 'vocabTest' && (
                  <div className="animate-in duration-500">
                    <Quiz questions={VOCAB_TEST} title="生词测试 (Vocabulary Test)" />
                  </div>
                )}

                {activeTab === 'fillBlanks' && (
                  <div className="animate-in duration-500">
                    <FillInBlanks />
                  </div>
                )}

                {activeTab === 'dialogues' && (
                  <div className="animate-in duration-500">
                    <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                      <MessageCircle className="mr-3 text-red-500"/> 对话内容 (Dialogues)
                    </h2>
                    <Dialogues />
                  </div>
                )}

                {activeTab === 'grammar' && (
                  <div className="animate-in duration-500">
                     <h2 className="text-2xl font-bold mb-6 text-gray-800 flex items-center">
                      <BookOpen className="mr-3 text-red-500"/> 语法解释 (Grammar)
                    </h2>
                    <Grammar />
                  </div>
                )}

                {activeTab === 'grammarTest' && (
                  <div className="animate-in duration-500">
                    <Quiz questions={GRAMMAR_TEST} title="语法测试 (Grammar Test)" />
                  </div>
                )}
              </main>

              {/* Footer */}
              <footer className="bg-gray-900 text-gray-300 py-8 mt-12 border-t-4 border-red-600">
                <div className="max-w-5xl mx-auto px-4 text-center space-y-2">
                  <p className="font-semibold text-lg text-white">HSK 3 Standard Course - Lesson 8</p>
                  <p className="text-sm opacity-80">
                    © 2026 Dilfuza Kāng lǎo shī (telegram@diffila). All rights reserved.
                  </p>
                  <div className="flex justify-center mt-4 opacity-50">
                     <PandaSVG />
                  </div>
                </div>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
